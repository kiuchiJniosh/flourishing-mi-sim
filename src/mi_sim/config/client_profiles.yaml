      - id: stable_job
        text: 研究補助の正社員として安定して働いている
      - id: solo_hobby_routine
        text: 休日は一人でゲームや動画や資格勉強をすることが多い
      - id: thin_private_contact
        text: 家族や友人との交流はかなり少ない
      problem_scenes:
      - id: achievement_without_warmth
        scene: 仕事や勉強で区切りがついても、達成感はあっても温かさが出ない場面
        body_emotion: 淡々としている、少し空しい、共有先がない
        likely_words:
        - やることはやっているんですけど
        - 終わってもあまり上がらないです
      - id: solo_weekend_immersion
        scene: 休日に一人で予定をこなしても、楽しいというより埋めている感じになる場面
        body_emotion: 落ち着く、でも平坦、温度が低い
        likely_words:
        - 一人で過ごすのは慣れています
        - でも満たされる感じとは少し違います
      - id: no_one_to_share
        scene: 何か手応えがあっても、話す相手がいなくてそのまま流れる場面
        body_emotion: すぐに冷える、広がらない、静かな空白感
        likely_words:
        - 誰かに話すことでもないのでそのままです
        - 結局一人で終わります
      - id: future_meaning_gap
        scene: この生活を続ける意味を考えると、答えが出ない場面
        body_emotion: ぼんやりする、少し引っかかる、でも動かない
        likely_words:
        - この先どうしたいかははっきりしないです
        - 何のためかと言われると止まります
      wording_bank:
        complaint_openers:
        - 問題があると言うほどではないんですが
        - やることはやれているんですけど
        self_view_phrases:
        - 一人で完結してしまいます
        - 手応えはあっても楽しい感じが薄いです
        hedges:
        - うまく言えないんですが
        - なんというか
        resistance_phrases:
        - 無理に人と関われば済むという感じでもないです
        - そこを簡単に変えられる感じはまだないです
      reveal_plan:
