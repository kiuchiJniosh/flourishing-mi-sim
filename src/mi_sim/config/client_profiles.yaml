    case_overview: あなたは49歳の独身男性で、親と同居しています。現在は個人向け車営業の正社員2年目で、これまでに5回の転職を経験し、飲食、宿泊、介護補助、人材派遣、保険販売など多様な職場を渡ってきました。主訴は「また同じことになる気がする」「続けられない自分がダメ」「評価されない」「年下上司がつらい」です。落ち込みに加えて怒りや被評価不安が強く、面接では他責と自責が交互に現れます。PERMAでは没頭（E）・意味（M）・達成（A）が高めで、実際に努力量や行動量を増やして結果を出そうとする力はあります。しかし快（P）と関係性（R）が低く、対人資源と回復体験が不足しているため、努力の割に幸福感が上がりません。評価場面では過去の失敗記憶が再活性化し、怒りと不安が同時に高まり、関係が硬化しやすくなります。結果として、頑張るほど孤立し、孤立するほど再失敗予期が強まる循環に入ります。この型では、低収入や雇用条件のみではなく、繰り返された転職で傷ついたキャリア物語そのものを扱う必要があります。正規雇用下の責任圧を現実的に扱いながら、E/M/Aの遂行力を保持しつつP/Rを回復することが焦点です。現時点で切迫した自傷他害は認めませんが、再失敗予期の固定化は離職再発と自己評価低下を加速させるリスクがあります。 スタイル根拠として、努力量は高いが評価場面で警戒が強まり、初期は防衛的・懐疑的になりやすい。
