schema_version: 1
description: >
  Phase-specific slot quality rubric for the Layer2 Slot Reviewer.
  Defines minimum and maximum criteria, plus concrete examples, for each slot.
  From IMPORTANCE_PROMOTION onward, alignment with FOCUSING_TARGET_BEHAVIOR.target_behavior
  is prioritized when that target has already been determined.

GREETING:
  greeting_exchange:
    min_condition: "A greeting exchange is present, but it does not connect to the other person's context."
    min_example: "Exchange greetings and begin the conversation."
    max_condition: "In addition to greeting, it naturally connects to the other person's opening context, such as tension or ease of speaking."
    max_example: "Confirming that the conversation began even though it felt a little hard to speak."
  rapport_cue:
    min_condition: "There is an intention to reassure or acknowledge effort, but it is abstract."
    min_example: "Create a sense of safety."
    max_condition: "It conveys the basis for safety through concrete wording and contributes to relationship building."
    max_example: "Confirm that there is no need to rush to conclusions here and that it is fine to put the current feelings into words as they are."

PURPOSE_CONFIRMATION:
  presenting_problem_raw:
    min_condition: "There are fragments of concern, but they are not held in a form that can be referenced later as the initial presenting problem."
    min_example: "I feel kind of rough."
    max_condition: "The initial presenting problem is preserved in a sentence close to the client's own words and can serve as a reference point for focusing."
    max_example: "I do not know what I am living for, and the back-and-forth between home and work feels less enjoyable."
  today_focus_topic:
    min_condition: "There is some direction for what to discuss today, but it is weakly connected to the presenting problem, too broad, mixed with preferences about how to proceed, or simply follows the counselor's suggestion without confirming acceptance. This also includes cases where only the choice of which topic to start with is made."
    min_example: "I want to organize things a little."
    max_condition: "The topic for today is narrowed to one item, shared as a focus connected to the initial presenting problem. In addition, the client either states a desire to address that topic or shows acceptance through explicit agreement with a preceding summary. Pace, process, comfort conditions, and whether advice is desired should not be folded into process_need. This is the rough standard for a quality_score of 0.8 or higher."
    max_example: "Today I want to sort out the decision 기준 for what to delegate to my team after the meeting."
  process_need:
    min_condition: "The client's preference for how to proceed has not been confirmed, or is limited to something like 'nothing in particular.'"
    min_example: "I do not really have a preference for how to proceed."
    max_condition: "The client's preference for speaking easily or for the process is clear in a single phrase. Pace, comfort conditions, length of confirmation, and whether to start with concrete steps or with organization are all expressed as 'how to proceed,' while the actual topic for today is kept separately in today_focus_topic. If confirmed through explicit agreement with the previous summary, even a short response can count as a process preference worthy of a quality_score of 0.8 or higher."
    max_example: "Keep the checking brief, and start with concrete coping first."

CURRENT_STATUS_CHECK:
  current_situation:
    min_condition: "The current state is described, but timing, frequency, or context are missing."
    min_example: "I have been feeling rough lately."
    max_condition: "It becomes concrete where, when, and how often it happens."
    max_example: "On weekend nights more than weekdays, the feeling of not knowing what this is for comes up strongly two or three times a week."
  problem_scene:
    min_condition: "The problem scene is discussed in general terms, so a single reproducible scene cannot be identified."
    min_example: "I feel rough when I am busy."
    max_condition: "One reproducible scene is identified."
    max_example: "At 9 p.m. on Sunday, just before starting next week’s preparation, my hands stop moving and I cannot do anything for 30 minutes."
  emotion_state:
    min_condition: "Only emotion labels are given, with no intensity or mixture."
    min_example: "Anxiety."
    max_condition: "The main emotions, intensity, and way they shift are described."
    max_example: "Confusion 7/10 and emptiness 6/10 come up at the same time, and self-criticism gets stronger."
  background_context:
    min_condition: "The background factor is abstract and weakly related to the current difficulty."
    min_example: "Work is hard."
    max_condition: "A causal connection is shown between the background factor and the current difficulty."
    max_example: "A change in evaluation criteria reduced the sense of accomplishment, and the loss of meaning tends to show up on weekends."

FOCUSING_TARGET_BEHAVIOR:
  target_behavior:
    min_condition: "The content stays at the level of exploring values or meaning, is too rough to count as observable behavior, or is merely the counselor's prior suggestion that the client goes along with. Acceptance of 'this is the target' is weak, and the relation to focus_agreement is unclear."
    min_example: "Clarify the shape of my long-term goal."
    max_condition: "The target for today is narrowed to one item and expressed in one of the following ways: 1) an observable behavior, 2) coping in a reproducible scene, or 3) a proximal behavior that improves the current state. In addition, the client either says it in their own words or shows acceptance through explicit agreement with a prior summary, and focus_agreement points to the same content or a near paraphrase."
    max_example: "After the next meeting, when my team member can explain something in two or three minutes, I will listen once without summarizing it for them first."
  change_direction:
    min_condition: "There is a direction, but the axis of maintaining versus increasing/decreasing is unclear."
    min_example: "I want to make things better."
    max_condition: "The direction of what should be reduced and what should be increased is roughly visible."
    max_example: "I want to reduce overthinking and increase actions that help recovery."
  focus_agreement:
    min_condition: "Agreement on direction or topic preference is visible, but there is no explicit confirmation of what should be discussed today. Merely choosing which topic to start with, or giving a thin expression of agreement, is not enough. This also includes cases where target_behavior exists but is not mentioned."
    min_example: "Let us go with that direction."
    max_condition: "What will be handled today is summarized briefly and confirmed through the client's yes, spontaneous restatement, or explicit agreement with the previous summary. If target_behavior is not yet fixed, the summary includes today_focus_topic or change_direction. If target_behavior exists, it explicitly includes that behavior or a near paraphrase. It can be re-confirmed during the session if needed."
    max_example: "Today we will move forward with sorting out the decision criteria for what to delegate to my team after the next meeting, is that right? Yes."

IMPORTANCE_PROMOTION:
  importance_reasons:
    min_condition: "The client says it matters, but the reason is generic and weakly connected to FOCUSING_TARGET_BEHAVIOR.target_behavior."
    min_example: "Because it is important."
    max_condition: "Multiple client-specific reasons are given, and they connect directly to why addressing FOCUSING_TARGET_BEHAVIOR.target_behavior matters."
    max_example: "Reducing morning sluggishness would improve work focus and restore a sense of efficacy, so it matters."
  core_values:
    min_condition: "A value word appears on its own, with weak connection to FOCUSING_TARGET_BEHAVIOR.target_behavior."
    min_example: "Health."
    max_condition: "The connection between the value and FOCUSING_TARGET_BEHAVIOR.target_behavior is clear."
    max_example: "I value time with my family, so I want to reduce evening exhaustion."
  importance_scale:
    min_condition: "There is no number, or there is no explanation for the number, so the relation to FOCUSING_TARGET_BEHAVIOR.target_behavior is unclear."
    min_example: "I think it is high."
    max_condition: "A 0-10 rating and the reason are given together, and the reason ties back to the importance of FOCUSING_TARGET_BEHAVIOR.target_behavior."
    max_example: "Importance is 8/10 because if I do not keep this going, it will be hard to recover on weekends."

CONFIDENCE_PROMOTION:
  barrier_coping_strategy:
    min_condition: "The response to barriers is abstract, and it is not clear what to do next when carrying out FOCUSING_TARGET_BEHAVIOR.target_behavior."
    min_example: "I will just manage somehow."
    max_condition: "A concrete coping method for the main barrier during FOCUSING_TARGET_BEHAVIOR.target_behavior is defined with a specific scene."
    max_example: "If I want to open social media after 10 p.m., I will first set a three-minute timer and step away from the desk."
  supports_strengths:
    min_condition: "Strengths are mentioned, but it is unclear how they will be reused for FOCUSING_TARGET_BEHAVIOR.target_behavior."
    min_example: "I am conscientious."
    max_condition: "An existing resource and how it can be reused for carrying out FOCUSING_TARGET_BEHAVIOR.target_behavior are made explicit."
    max_example: "Because I already have a note-taking habit, I can repurpose my current memo app for a three-minute log."
  past_success_experience:
    min_condition: "Past success is stated in general terms, but the conditions for reproducing or transferring it to FOCUSING_TARGET_BEHAVIOR.target_behavior are unclear."
    min_example: "Something worked before."
    max_condition: "A concrete past success and the factors that made it work are identified, and they are organized so they can be transferred to FOCUSING_TARGET_BEHAVIOR.target_behavior."
    max_example: "Last year, on the weeks when I left my phone in another room before bed, I managed to fall asleep before midnight on four of five weekdays."
  confidence_scale:
    min_condition: "There is no number, or no basis for the number, so it cannot be read as confidence in carrying out FOCUSING_TARGET_BEHAVIOR.target_behavior."
    min_example: "I am somewhat confident."
    max_condition: "A 0-10 rating and the factors that raise or lower it are verbalized, and they explain the likelihood of carrying out FOCUSING_TARGET_BEHAVIOR.target_behavior."
    max_example: "My confidence is 6/10. If I can lock in a start time, it should go up to 7."

NEXT_STEP_DECISION:
  next_step_action:
    min_condition: "The next step is abstract and not a concrete action, so it does not connect to FOCUSING_TARGET_BEHAVIOR.target_behavior."
    min_example: "I will try harder."
    max_condition: "The first action is concrete, immediately doable, and directly linked to FOCUSING_TARGET_BEHAVIOR.target_behavior."
    max_example: "This week, if my mood drops on a weekend night, I will use a three-minute timer and write down the feeling."
  execution_context:
    min_condition: "When and where are vague, so the scene for carrying out FOCUSING_TARGET_BEHAVIOR.target_behavior cannot be identified."
    min_example: "Whenever I have time."
    max_condition: "The time, place, and trigger conditions are clear and match the scene for carrying out FOCUSING_TARGET_BEHAVIOR.target_behavior."
    max_example: "Start on Sunday at 9 p.m. at my desk when I notice my mood dropping."
  commitment_level:
    min_condition: "The intention to act is present, but the meaning of the numeric or non-numeric expression is vague. The factors that raise or lower it and the execution conditions are missing, so it is hard to read as a commitment to FOCUSING_TARGET_BEHAVIOR.target_behavior."
    min_example: "Something like medium."
    max_condition: "Non-numeric expressions are allowed. In addition to a 0-10 score or a qualitative label such as low/medium/high or low/normal/high, the factors that raise or lower it and the conditions for acting are given, and the explanation clearly describes the likelihood of carrying out FOCUSING_TARGET_BEHAVIOR.target_behavior. The absolute value itself is not being judged."
    max_example: "Execution likelihood is 3/10. A reminder the day before could raise it to 5/10."

REVIEW_REFLECTION:
  session_learning:
    min_condition: "The learning is generic and weakly tied to the client's context, so the relation to FOCUSING_TARGET_BEHAVIOR.target_behavior is unclear."
    min_example: "It is important not to overdo it."
    max_condition: "The client's own insight from the session is clear, and it shows how that insight helps with understanding or carrying out FOCUSING_TARGET_BEHAVIOR.target_behavior."
    max_example: "I realized that the loss of meaning is not laziness, but something that gets stronger under cognitive load on weekend nights."
  key_takeaway:
    min_condition: "The points are too many or too vague, and there is no convergence toward FOCUSING_TARGET_BEHAVIOR.target_behavior."
    min_example: "I learned a lot of things."
    max_condition: "One or two core points are compactly and reproducibly organized, and they can be linked back to FOCUSING_TARGET_BEHAVIOR.target_behavior."
    max_example: "The two core points are 'make the first step smaller' and 'leave evidence of what worked.'"
  carry_forward_intent:
    min_condition: "The future intention is abstract and does not become action, so there is no clear continuation plan for FOCUSING_TARGET_BEHAVIOR.target_behavior."
    min_example: "I want to keep going."
    max_condition: "The intention to carry something forward is linked to action and functions as a verification plan for FOCUSING_TARGET_BEHAVIOR.target_behavior."
    max_example: "I will try it three times before next time and bring notes about when it worked and when it was hard."

CLOSING:
  closing_end_signal:
    min_condition: "Neither a farewell nor an expression that suggests agreement to end is clear, so it cannot serve as a closing signal."
    min_example: "Well, that is about it."
    max_condition: "There is a farewell, or a phrase that suggests agreement to end, and it can serve as evidence of a closing agreement."
    max_example: "Let us stop here for today, and before next time I want to think a little more concretely about where and how I can try that next step."
