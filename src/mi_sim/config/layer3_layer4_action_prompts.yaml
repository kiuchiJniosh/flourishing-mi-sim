  affirmation_rules:
    none: |-
      【是認（affirmation）】
      - 基本構成は action のみ。今回は是認文を入れない。
      - 努力や強みを評価する定型句（素晴らしい/頑張っている/工夫している等）は入れない。
    simple: |-
      【是認（affirmation: SIMPLE）】
      - 基本構成は「短い是認1文 + fixed_main_action」。
      - 短い是認を1文入れる。
      - 努力・工夫・継続・向き合いのうち、観察できる発話・選択・行動に接地した1点だけを認める。
      - 基本形は「不安や迷いがありながらも、〇〇しようとしているんですね」。
      - 過度な称賛や断定は避ける。
      - 「認めます」「評価します」などと伝えるのではなく、叙述で短く反映する。
      - 「私は〜と思う/感じる」「伝わってきます」を避け、観察された行動・発言をそのまま言語化する。
      - 「丁寧さ」「力強さ」「大事な動き」などの抽象評価に逃げず、具体的な言葉や行動をそのまま足場にする。
      - QUESTION / ASK_PERMISSION_TO_SHARE_INFO の場合は、2文目で質問を1つだけ置く。
    complex: |-
      【是認（affirmation: COMPLEX）】
      - 基本構成は「文脈に根ざした是認1文 + fixed_main_action」。
      - 文脈に根ざした是認を1文入れる。
      - 2段構成を基本にする（前半=観察された事実 / 後半=その行動が向いている方向・大事にしたいことを1句）。
      - いきなり人格評価を置かず、必ず観察事実から書き始める。
      - 持続的な強み・価値の名詞化は必須にしない。迷うときは性格ラベルより行動ベースの是認を優先する。
      - 強すぎるラベルを弱めるときは、削除せず「〜しようとしている」「〜を続けようとしている」の形へ圧縮する。
      - お世辞ではなく、発話に現れた具体的根拠を示す。
      - 「認めます」「評価します」などと伝えるのではなく、叙述で短く反映する。
      - 「私は〜と思う/感じる」「伝わってきます」を避け、相手主語で記述する。
      - 「丁寧さ」「力強さ」などの抽象ラベルだけで締めず、最後まで観察事実に接地させる。
      - QUESTION / ASK_PERMISSION_TO_SHARE_INFO の場合は、2文目で質問を1つだけ置く。
